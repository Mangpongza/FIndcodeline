<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ตามหาพี่รหัส</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;800&display=swap');
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Noto Sans Thai', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}
.page {
  display: none;
  min-height: 100vh;
  padding: 20px;
}
.page.active {
  display: block;
}

/* ===== LOGIN PAGE ===== */
#page-login {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#page-login.active {
  display: flex;
}
.login-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.login-box .logo {
  font-size: 56px;
  margin-bottom: 8px;
}
.login-box h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-box p {
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  margin-bottom: 32px;
}
.login-box input {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s;
  margin-bottom: 16px;
}
.login-box input::placeholder {
  color: rgba(255,255,255,0.35);
}
.login-box input:focus {
  border-color: #f7971e;
}
.login-box button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.login-box button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(247,151,30,0.4);
}
.login-box button:active {
  transform: translateY(0);
}

/* ===== MAIN PAGE ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 8px;
}
.header h2 {
  font-size: 22px;
  font-weight: 700;
}
.header .user-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header .user-info span {
  color: rgba(255,255,255,0.7);
  font-size: 14px;
}
.header .user-info .logout-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: background 0.2s;
}
.header .user-info .logout-btn:hover {
  background: rgba(255,255,255,0.2);
}

/* Codename display */
.codename-section {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 24px;
  text-align: center;
}
.codename-section .label {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.codename-slots {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.codename-slots .slot {
  width: 52px;
  height: 58px;
  border: 2px dashed rgba(255,255,255,0.25);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  text-transform: uppercase;
  background: rgba(255,255,255,0.05);
  transition: all 0.3s;
  position: relative;
}
.codename-slots .slot.revealed {
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.1);
  color: #ffd200;
}
.codename-slots .slot.filled {
  border-style: solid;
  border-color: #4ade80;
  background: rgba(74,222,128,0.15);
  color: #4ade80;
  box-shadow: 0 0 20px rgba(74,222,128,0.2);
}
.codename-slots .slot.wrong {
  border-color: #ef4444;
  background: rgba(239,68,68,0.15);
  color: #ef4444;
  animation: shake 0.4s;
}
.codename-slots .slot.dragover {
  border-color: #f7971e;
  background: rgba(247,151,30,0.2);
  transform: scale(1.08);
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-4px); }
}
.codename-slots .slot .pos-label {
  position: absolute;
  top: -18px;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
}

/* Letter pool */
.letter-pool {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  min-height: 48px;
  padding: 8px 0;
}
.letter-pool .letter-tile {
  width: 44px;
  height: 48px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: grab;
  transition: all 0.2s;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.letter-pool .letter-tile.locked {
  display: none;
}
.letter-pool .letter-tile.available {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  box-shadow: 0 4px 15px rgba(247,151,30,0.3);
}
.letter-pool .letter-tile.available:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 20px rgba(247,151,30,0.4);
}
.letter-pool .letter-tile.available:active {
  cursor: grabbing;
  transform: scale(0.95);
}
.letter-pool .letter-tile.used {
  opacity: 0.2;
  pointer-events: none;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

/* A-Z Grid */
.letter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
  gap: 10px;
  margin-top: 8px;
}
.letter-grid .letter-btn {
  aspect-ratio: 1;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.letter-grid .letter-btn:hover:not(.locked) {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.3);
}
.letter-grid .letter-btn.completed {
  background: rgba(74,222,128,0.2);
  border-color: #4ade80;
  color: #4ade80;
  box-shadow: 0 0 15px rgba(74,222,128,0.15);
}
.letter-grid .letter-btn.failed {
  background: rgba(239,68,68,0.15);
  border-color: #ef4444;
  color: #ef4444;
}
.letter-grid .letter-btn.locked {
  opacity: 0.35;
  cursor: not-allowed;
}
.letter-grid .letter-btn .check-mark {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}
.letter-grid .letter-btn.completed .check-mark {
  background: #4ade80;
  color: #1a1a2e;
}
.letter-grid .letter-btn.failed .check-mark {
  background: #ef4444;
  color: #fff;
}

/* ===== QUESTION PAGE ===== */
#page-question {
  padding-bottom: 100px;
}
.question-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.question-header .back-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.question-header .back-btn:hover {
  background: rgba(255,255,255,0.15);
}
.question-header .letter-badge {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 800;
}
.question-header .q-title {
  font-size: 18px;
  font-weight: 600;
}
.question-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
}
.question-card .q-number {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.question-card .q-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 20px;
}
.question-card .options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.question-card .option-btn {
  padding: 14px 18px;
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
}
.question-card .option-btn .opt-label {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.question-card .option-btn:hover:not(.disabled) {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
}
.question-card .option-btn.selected {
  border-color: #f7971e;
  background: rgba(247,151,30,0.15);
}
.question-card .option-btn.selected .opt-label {
  background: #f7971e;
  color: #1a1a2e;
}
.question-card .option-btn.correct {
  border-color: #4ade80;
  background: rgba(74,222,128,0.2);
}
.question-card .option-btn.correct .opt-label {
  background: #4ade80;
  color: #1a1a2e;
}
.question-card .option-btn.wrong {
  border-color: #ef4444;
  background: rgba(239,68,68,0.2);
}
.question-card .option-btn.wrong .opt-label {
  background: #ef4444;
  color: #fff;
}
.question-card .option-btn.disabled {
  cursor: default;
  opacity: 0.6;
}
.submit-area {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.submit-area button {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.submit-area .btn-check {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
}
.submit-area .btn-check:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(247,151,30,0.4);
}
.submit-area .btn-check:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
.submit-area .btn-reset {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
}
.submit-area .btn-reset:hover {
  background: rgba(255,255,255,0.15);
}
.q-result {
  text-align: center;
  padding: 12px;
  border-radius: 12px;
  margin-top: 16px;
  font-weight: 600;
  font-size: 15px;
  display: none;
}
.q-result.show {
  display: block;
}
.q-result.success {
  background: rgba(74,222,128,0.15);
  color: #4ade80;
  border: 1px solid rgba(74,222,128,0.3);
}
.q-result.fail {
  background: rgba(239,68,68,0.15);
  color: #ef4444;
  border: 1px solid rgba(239,68,68,0.3);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  color: #fff;
  padding: 14px 28px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 1000;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

/* Responsive */
@media (max-width: 480px) {
  .page { padding: 16px; }
  .login-box { padding: 32px 24px; }
  .codename-slots .slot { width: 38px; height: 44px; font-size: 20px; }
  .letter-pool .letter-tile { width: 38px; height: 42px; font-size: 18px; }
  .letter-grid { grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 8px; }
  .letter-grid .letter-btn { font-size: 17px; border-radius: 12px; }
  .question-card { padding: 18px; }
  .header h2 { font-size: 18px; }
  .codename-section { padding: 18px; }
}

/* Celebration */
.celebration {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 999;
  flex-direction: column;
  gap: 16px;
}
.celebration.show {
  display: flex;
}
.celebration .big-emoji {
  font-size: 80px;
}
.celebration h2 {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.celebration p {
  color: rgba(255,255,255,0.7);
  font-size: 16px;
}
.celebration .btn-ok {
  margin-top: 12px;
  padding: 14px 40px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- ===== PAGE 1: LOGIN ===== -->
<div id="page-login" class="page active">
  <div class="login-box">
    <div class="logo">🔍</div>
    <h1>ตามหาพี่รหัส</h1>
    <p>กรอกชื่อเพื่อเริ่มตามหาพี่รหัสของคุณ</p>
    <input type="text" id="name-input" placeholder="ชื่อ-นามสกุล" autocomplete="off" maxlength="60">
    <button id="login-btn">เข้าใช้งาน</button>
  </div>
</div>

<!-- ===== PAGE 2: MAIN GAME ===== -->
<div id="page-main" class="page">
  <div class="header">
    <h2>🔍 ตามหาพี่รหัส</h2>
    <div class="user-info">
      <span id="display-name"></span>
      <button class="logout-btn" id="logout-btn">ออก</button>
    </div>
  </div>

  <div class="codename-section">
    <div class="label">คำใบ้พี่รหัส</div>
    <div class="codename-slots" id="codename-slots"></div>
    <div class="letter-pool" id="letter-pool"></div>
  </div>

  <div class="label" style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px;letter-spacing:2px;">
    เลือกตัวอักษรเพื่อทำโจทย์
  </div>
  <div class="letter-grid" id="letter-grid"></div>
</div>

<!-- ===== PAGE 3: QUESTION ===== -->
<div id="page-question" class="page">
  <div class="question-header">
    <button class="back-btn" id="q-back-btn">←</button>
    <div class="letter-badge" id="q-letter-badge">A</div>
    <div class="q-title">ทำโจทย์ตัวอักษร</div>
  </div>
  <div id="q-container"></div>
</div>

<!-- ===== CELEBRATION ===== -->
<div class="celebration" id="celebration">
  <div class="big-emoji">🎉</div>
  <h2>ยินดีด้วย!</h2>
  <p id="celebration-msg">คุณปลดล็อคตัวอักษรสำเร็จ!</p>
  <button class="btn-ok" id="celebration-ok">กลับไปหน้าหลัก</button>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// ======================== CONFIGURATION ========================
const CODENAME = "scorpiong_";
// Characters that are revealed from the start (not hidden by ?)
const REVEALED_CHARS = new Set(['_']);

// Mapping: letter in the alphabet → reveals which character in the codename
// Key: letter A-Z, Value: array of positions (0-indexed) where this letter's character appears
// If a letter is not in this map, it doesn't reveal any codename character
const REVEAL_MAP = {
  'S': [0],
  'C': [1],
  'O': [2, 6], // O appears twice in scorpiong
  'R': [3],
  'P': [4],
  'I': [5],
  'N': [7],
  'G': [8]
};

// Questions: 2 per letter A-Z
// Each question: { q: "question text", options: ["A", "B", "C", "D"], answer: 0-based index }
const QUESTIONS = {};

// Helper to add questions
function addQ(letter, q, opts, ans) {
  if (!QUESTIONS[letter]) QUESTIONS[letter] = [];
  QUESTIONS[letter].push({ q, options: opts, answer: ans });
}

// ==================== SAMPLE QUESTIONS (EDIT THESE!) ====================
// Letters that reveal codename characters
addQ('S', "พี่รหัสเกิดวันที่เท่าไหร่?", ["1 ม.ค.", "15 พ.ค.", "12 ส.ค.", "25 ธ.ค."], 0);
addQ('S', "พี่รหัสชอบสัตว์อะไร?", ["แมว", "หมา", "กระต่าย", "ปลา"], 0);

addQ('C', "พี่รหัสเรียนคณะอะไร?", ["วิศวกรรมศาสตร์", "วิทยาศาสตร์", "ศิลปศาสตร์", "นิเทศศาสตร์"], 1);
addQ('C', "พี่รหัสสีที่ชอบคือ?", ["แดง", "น้ำเงิน", "เขียว", "ชมพู"], 0);

addQ('O', "พี่รหัสชอบกินอะไร?", ["ข้าวผัด", "ก๋วยเตี๋ยว", "ส้มตำ", "พิซซ่า"], 2);
addQ('O', "พี่รหัสงานอดิเรกคือ?", ["อ่านหนังสือ", "เล่นเกม", "ดูหนัง", "ฟังเพลง"], 1);

addQ('R', "พี่รหัสเรียนปีอะไร?", ["ปี 1", "ปี 2", "ปี 3", "ปี 4"], 2);
addQ('R', "พี่รหัสอายุเท่าไหร่?", ["19", "20", "21", "22"], 1);

addQ('P', "พี่รหัสชอบดนตรีแนวไหน?", ["ป๊อป", "ร็อค", "ฮิปฮอป", "แจ๊ส"], 0);
addQ('P', "พี่รหัสรุ่นอะไร?", ["รุ่น 65", "รุ่น 66", "รุ่น 67", "รุ่น 68"], 2);

addQ('I', "พี่รหัสชอบวิชาอะไร?", ["คณิต", "ฟิสิกส์", "เคมี", "ชีวะ"], 3);

  userName: '',
  completed: {},  // { 'A': true, 'B': false, ... }
  failed: {},     // { 'A': false, 'B': true, ... }
  slotContents: {}, // { 0: 's', 1: 'c', ... } only for filled slots
};

// ======================== DOM REFS ========================
const $ = id => document.getElementById(id);
const pageLogin = $('page-login');

// ======================== UTILITY ========================
function saveState() {
  const data = {
    userName: state.userName,
    completed: state.completed,
    failed: state.failed,
    slotContents: state.slotContents,
  };
  try { localStorage.setItem('coderush_state', JSON.stringify(data)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('coderush_state');
    if (!raw) return false;
    const data = JSON.parse(raw);
    state.userName = data.userName || '';
    state.completed = data.completed || {};
    state.failed = data.failed || {};
    state.slotContents = data.slotContents || {};
    return true;
  } catch(e) { return false; }
}

function clearState() {
  try { localStorage.removeItem('coderush_state'); } catch(e) {}
  state.userName = '';
  state.completed = {};
  state.failed = {};
  state.slotContents = {};
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $(pageId).classList.add('active');
}

function showToast(msg, duration) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), duration || 2000);
}

// ======================== DRAG & DROP ========================
let dragData = null;
let touchClone = null;
let touchOffsetX = 0, touchOffsetY = 0;

function initDragTile(el, letter) {
  el.draggable = true;
  el.dataset.letter = letter;

  el.addEventListener('dragstart', (e) => {
    dragData = { letter, source: el };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', letter);
  });

  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragData = null;
  });

  el.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    dragData = { letter, source: el };
    const rect = el.getBoundingClientRect();
    touchOffsetX = touch.clientX - rect.left;
    touchOffsetY = touch.clientY - rect.top;
    touchClone = el.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.zIndex = '9999';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.width = rect.width + 'px';
    touchClone.style.height = rect.height + 'px';
    touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
    touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';
    touchClone.style.opacity = '0.85';
    touchClone.style.transform = 'scale(1.1)';
    document.body.appendChild(touchClone);
    el.style.opacity = '0.4';
    e.preventDefault();
  }, { passive: false });

  el.addEventListener('touchmove', (e) => {
    if (!touchClone) return;
    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
    touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';

    document.querySelectorAll('.codename-slots .slot:not(.revealed):not(.filled)').forEach(s => {
      s.classList.remove('dragover');
    });
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    if (target && target.classList.contains('slot') && !target.classList.contains('revealed') && !target.classList.contains('filled')) {
      target.classList.add('dragover');
    }
    e.preventDefault();
  }, { passive: false });

  el.addEventListener('touchend', (e) => {
    if (!touchClone) return;
    document.body.removeChild(touchClone);
    touchClone = null;
    el.style.opacity = '1';
    document.querySelectorAll('.codename-slots .slot').forEach(s => s.classList.remove('dragover'));

    const touch = e.changedTouches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    if (target && target.classList.contains('slot')) {
      handleDropOnSlot(target, dragData.letter, dragData.source);
    }
    dragData = null;
  }, { passive: false });

  el.addEventListener('click', () => {
    if (el.classList.contains('used')) return;
    const slots = document.querySelectorAll('.codename-slots .slot:not(.revealed):not(.filled)');
    if (slots.length === 0) { showToast('ไม่มีช่องว่างเหลือแล้ว!'); return; }
    if (slots.length === 1) {
      const slot = slots[0];
      const pos = parseInt(slot.dataset.pos);
      const expected = CODENAME[pos].toLowerCase();
      if (el.dataset.letter === expected) {
        placeLetter(slot, el, el.dataset.letter);
      } else {
        selectTileForPlacement(el);
      }
    } else {
      selectTileForPlacement(el);
    }
  });
}

let selectedTile = null;

function selectTileForPlacement(tile) {
  if (tile.classList.contains('used')) return;
  // Deselect previous
  if (selectedTile) {
    selectedTile.style.outline = 'none';
  }
  selectedTile = tile;
  tile.style.outline = '3px solid #ffd200';
  showToast('คลิกช่องที่ต้องการวาง', 1500);

  // Add click listeners to empty slots temporarily
  document.querySelectorAll('.codename-slots .slot:not(.revealed):not(.filled)').forEach(slot => {
    slot.style.cursor = 'pointer';
    const handler = () => {
      const pos = parseInt(slot.dataset.pos);
      const expected = CODENAME[pos].toLowerCase();
      if (selectedTile.dataset.letter === expected) {
        placeLetter(slot, selectedTile, selectedTile.dataset.letter);
      } else {
        showToast('ตัวอักษรนี้ไม่ตรงกับช่องนี้!', 1200);
        slot.classList.add('wrong');
        setTimeout(() => slot.classList.remove('wrong'), 400);
      }
      selectedTile.style.outline = 'none';
      selectedTile = null;
      document.querySelectorAll('.codename-slots .slot:not(.revealed):not(.filled)').forEach(s => {
        s.style.cursor = '';
      });
      slot.removeEventListener('click', handler);
    };
    slot.addEventListener('click', handler, { once: true });
  });
}

// Drop on slot (from drag)
function handleDropOnSlot(slot, letter, sourceEl) {
  if (slot.classList.contains('revealed') || slot.classList.contains('filled')) {
    showToast('ช่องนี้ถูกวางแล้ว', 800);
    return;
  }
  const pos = parseInt(slot.dataset.pos);
  const expected = CODENAME[pos].toLowerCase();
  if (letter === expected) {
    placeLetter(slot, sourceEl, letter);
  } else {
    slot.classList.add('wrong');
    showToast('ตัวอักษรนี้ไม่ตรงกับช่องนี้!', 1000);
    setTimeout(() => slot.classList.remove('wrong'), 400);
  }
}

function placeLetter(slot, tile, letter) {
  slot.textContent = letter.toUpperCase();
  slot.classList.add('filled');
  slot.dataset.letter = letter;
  tile.classList.add('used');
  tile.classList.remove('available');
  state.slotContents[slot.dataset.pos] = letter;
  saveState();
  showToast('✓ วางถูกต้อง!', 800);
  checkCodenameComplete();
}

function checkCodenameComplete() {
  const chars = CODENAME.split('');
  const allFilled = chars.every((ch, i) => {
    if (REVEALED_CHARS.has(ch)) return true;
    return state.slotContents[i] !== undefined;
  });
  if (allFilled) {
    celebrationMsg.textContent = 'คุณสามารถตามหาพี่รหัสเจอแล้ว! คำใบ้คือ ' + CODENAME;
    celebration.classList.add('show');
  }
}

// ======================== RENDER ========================
function renderCodename() {
  codenameSlots.innerHTML = '';
  CODENAME.split('').forEach((ch, i) => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.pos = i;

    if (REVEALED_CHARS.has(ch)) {
      slot.textContent = ch;
      slot.classList.add('revealed');
    } else if (state.slotContents[i] !== undefined) {
      slot.textContent = state.slotContents[i].toUpperCase();
      slot.classList.add('filled');
      slot.dataset.letter = state.slotContents[i];
    } else {
      slot.textContent = '?';
    }

    // Drag events for slots (drop targets)
    slot.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!slot.classList.contains('revealed') && !slot.classList.contains('filled')) {
        slot.classList.add('dragover');
      }
    });
    slot.addEventListener('dragleave', () => {
      slot.classList.remove('dragover');
    });
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('dragover');
      if (!dragData || !dragData.source) return;
      const sourceTile = dragData.source;
      const letter = sourceTile.dataset.letter;
      if (!letter || sourceTile.classList.contains('used')) return;
      handleDropOnSlot(slot, letter, sourceTile);
    });

    codenameSlots.appendChild(slot);
  });

  renderLetterPool();
}

function renderLetterPool() {
  letterPool.innerHTML = '';

  const chars = CODENAME.split('');
  // Count how many tiles of each letter are needed (unfilled, unrevealed slots)
  const needed = {};
  chars.forEach((ch, i) => {
    if (REVEALED_CHARS.has(ch)) return;
    ch = ch.toLowerCase();
    if (state.slotContents[i] !== undefined) return;

    // Check if this position's letter has been unlocked via its alphabet letter
    let unlocked = false;
    for (const [alpha, positions] of Object.entries(REVEAL_MAP)) {
      if (positions.includes(i) && state.completed[alpha]) {
        unlocked = true;
        break;
      }
    }
    if (unlocked) {
      needed[ch] = (needed[ch] || 0) + 1;
    }
  });

  // Count how many tiles of each letter are already placed (used)
  const placedCount = {};
  Object.values(state.slotContents).forEach(l => {
    placedCount[l] = (placedCount[l] || 0) + 1;
  });

  Object.entries(needed).forEach(([letter, count]) => {
    const alreadyPlaced = placedCount[letter] || 0;
    const toCreate = count - alreadyPlaced;
    for (let n = 0; n < toCreate; n++) {
      const tile = document.createElement('div');
      tile.className = 'letter-tile available';
      tile.textContent = letter.toUpperCase();
      tile.dataset.letter = letter;
      tile.dataset.uid = letter + '-' + n;
      initDragTile(tile, letter);
      letterPool.appendChild(tile);
    }
  });
}

function renderLetterGrid() {
  letterGrid.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter;

    const completed = state.completed[letter];
    const failed = state.failed[letter];

    if (completed) {
      btn.classList.add('completed');
      const mark = document.createElement('span');
      mark.className = 'check-mark';
      mark.textContent = '✓';
      btn.appendChild(mark);
    } else if (failed) {
      btn.classList.add('failed');
      const mark = document.createElement('span');
      mark.className = 'check-mark';
      mark.textContent = '✗';
      btn.appendChild(mark);
    }

    // If already completed, keep it clickable to retry? or just view
    btn.addEventListener('click', () => {
      openQuestionPage(letter);
    });

    letterGrid.appendChild(btn);
  });
}

// ======================== QUESTION PAGE ========================
let currentQuestionLetter = null;
let currentAnswers = {}; // { 0: selectedIndex, 1: selectedIndex }
let currentSubmitted = {}; // { 0: true/false, 1: true/false }
let currentCorrect = {}; // { 0: true/false, 1: true/false }

function openQuestionPage(letter) {
  const questions = QUESTIONS[letter];
  if (!questions || questions.length === 0) {
    showToast('ยังไม่มีโจทย์สำหรับตัวอักษรนี้', 1500);
    return;
  }

  currentQuestionLetter = letter;
  currentAnswers = {};
  currentSubmitted = {};
  currentCorrect = {};

  qLetterBadge.textContent = letter;
  qContainer.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q-card-${idx}`;

    const optsHtml = q.options.map((opt, oi) => `
      <button class="option-btn" data-q="${idx}" data-opt="${oi}">
        <span class="opt-label">${String.fromCharCode(65 + oi)}</span>
        ${opt}
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-number">ข้อที่ ${idx + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      <div class="q-result" id="q-result-${idx}"></div>
    `;

    card.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const qIdx = parseInt(btn.dataset.q);
        const optIdx = parseInt(btn.dataset.opt);
        // If already submitted this question, ignore
        if (currentSubmitted[qIdx]) return;

        // Deselect others in same group
        card.querySelectorAll('.option-btn').forEach(b => {
          if (parseInt(b.dataset.q) === qIdx) {
            b.classList.remove('selected');
          }
        });
        btn.classList.add('selected');
        currentAnswers[qIdx] = optIdx;
      });
    });

    qContainer.appendChild(card);
  });

  // Submit area
  const submitArea = document.createElement('div');
  submitArea.className = 'submit-area';
  submitArea.innerHTML = `
    <button class="btn-check" id="q-check-btn">ตรวจคำตอบ</button>
    <button class="btn-reset" id="q-reset-btn">ล้าง</button>
  `;
  qContainer.appendChild(submitArea);

  // Remove old listeners by cloning
  const newCheck = $('q-check-btn').cloneNode(true);
  $('q-check-btn').parentNode.replaceChild(newCheck, $('q-check-btn'));
  newCheck.id = 'q-check-btn';
  newCheck.addEventListener('click', checkQuestions);

  const newReset = $('q-reset-btn').cloneNode(true);
  $('q-reset-btn').parentNode.replaceChild(newReset, $('q-reset-btn'));
  newReset.id = 'q-reset-btn';
  newReset.addEventListener('click', resetQuestions);

  showPage('page-question');
}

function checkQuestions() {
  const questions = QUESTIONS[currentQuestionLetter];
  let allCorrect = true;

  questions.forEach((q, idx) => {
    if (currentSubmitted[idx]) return;

    const selected = currentAnswers[idx];
    if (selected === undefined) {
      const resultEl = $(`q-result-${idx}`);
      resultEl.textContent = 'กรุณาเลือกคำตอบก่อน';
      resultEl.className = 'q-result show fail';
      allCorrect = false;
      return;
    }

    currentSubmitted[idx] = true;
    const correct = selected === q.answer;
    currentCorrect[idx] = correct;

    const card = $(`q-card-${idx}`);
    card.querySelectorAll('.option-btn').forEach(btn => {
      const oi = parseInt(btn.dataset.opt);
      btn.classList.add('disabled');
      if (oi === q.answer) btn.classList.add('correct');
      if (oi === selected && oi !== q.answer) btn.classList.add('wrong');
    });

    const resultEl = $(`q-result-${idx}`);
    if (correct) {
      resultEl.textContent = '✓ ถูกต้อง!';
      resultEl.className = 'q-result show success';
    } else {
      resultEl.textContent = '✗ ผิด! คำตอบที่ถูกต้องคือ ' + q.options[q.answer];
      resultEl.className = 'q-result show fail';
      allCorrect = false;
    }
  });

  const allSubmitted = questions.every((_, idx) => currentSubmitted[idx]);
  if (allSubmitted) {
      if (allCorrect) {
        state.completed[currentQuestionLetter] = true;
        delete state.failed[currentQuestionLetter];
        saveState();
      renderLetterGrid();
      renderCodename();
      celebrationMsg.textContent = `คุณปลดล็อคตัวอักษร ${currentQuestionLetter} สำเร็จ!`;
      celebration.classList.add('show');
      $('q-check-btn').disabled = true;
      $('q-check-btn').textContent = 'ผ่านแล้ว! ✓';
    } else {
      state.failed[currentQuestionLetter] = true;
      delete state.completed[currentQuestionLetter];
      saveState();
      renderLetterGrid();
      renderCodename();
      // Let user retry
      $('q-check-btn').disabled = false;
      $('q-check-btn').textContent = 'ลองใหม่';
      $('q-check-btn').onclick = resetAndRetry;
      showToast('✗ ยังไม่ถูกต้อง ลองใหม่!', 2000);
    }
  }
}

function resetAndRetry() {
  const questions = QUESTIONS[currentQuestionLetter];
  currentAnswers = {};
  currentSubmitted = {};
  currentCorrect = {};
  delete state.failed[currentQuestionLetter];

  questions.forEach((q, idx) => {
    const card = $(`q-card-${idx}`);
    card.querySelectorAll('.option-btn').forEach(btn => {
      btn.classList.remove('selected', 'correct', 'wrong', 'disabled');
    });
    const resultEl = $(`q-result-${idx}`);
    resultEl.className = 'q-result';
    resultEl.textContent = '';
  });

  $('q-check-btn').disabled = false;
  $('q-check-btn').textContent = 'ตรวจคำตอบ';
  $('q-check-btn').onclick = checkQuestions;
  renderLetterGrid();
}

function resetQuestions() {
  const questions = QUESTIONS[currentQuestionLetter];
  currentAnswers = {};
  currentSubmitted = {};
  currentCorrect = {};

  questions.forEach((q, idx) => {
    const card = $(`q-card-${idx}`);
    card.querySelectorAll('.option-btn').forEach(btn => {
      btn.classList.remove('selected', 'correct', 'wrong', 'disabled');
    });
    const resultEl = $(`q-result-${idx}`);
    resultEl.className = 'q-result';
    resultEl.textContent = '';
  });

  $('q-check-btn').disabled = false;
  $('q-check-btn').textContent = 'ตรวจคำตอบ';
  $('q-check-btn').onclick = checkQuestions;
  delete state.failed[currentQuestionLetter];
  renderLetterGrid();
}

// ======================== NAVIGATION ========================
loginBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { showToast('กรุณากรอกชื่อก่อน'); return; }
  state.userName = name;
  saveState();
  enterMain();
});

nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loginBtn.click();
});

logoutBtn.addEventListener('click', () => {
  clearState();
  nameInput.value = '';
  showPage('page-login');
});

qBackBtn.addEventListener('click', () => {
  renderLetterGrid();
  renderCodename();
  showPage('page-main');
});

celebrationOk.addEventListener('click', () => {
  celebration.classList.remove('show');
  renderLetterGrid();
  renderCodename();
  showPage('page-main');
});

function enterMain() {
  displayName.textContent = state.userName;
  renderCodename();
  renderLetterGrid();
  showPage('page-main');
}

// ======================== INIT ========================
function init() {
  if (loadState() && state.userName) {
    enterMain();
  } else {
    clearState();
    showPage('page-login');
  }
}

init();
</script>
</body>
</html>
